services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    env_file:
      - backend/.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
